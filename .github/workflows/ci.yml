name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: License must be AGPL-3.0
        run: grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE
      - name: NOTICE must credit Swiss Ephemeris
        run: grep -q "Astrodienst" NOTICE

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t ephemeris-service:ci .
      - name: Smoke test image
        run: |
          docker run -d --rm --name eph -p 8080:8080 ephemeris-service:ci
          for i in $(seq 1 20); do
            curl -fs localhost:8080/healthz && ok=1 && break || sleep 0.5
          done
          docker stop eph
          test "$ok" = "1"
