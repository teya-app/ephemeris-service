name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...
      - name: License must be AGPL-3.0
        run: grep -q "GNU AFFERO GENERAL PUBLIC LICENSE" LICENSE
      - name: NOTICE must credit Swiss Ephemeris
        run: grep -q "Astrodienst" NOTICE

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t ephemeris-service:ci .
      - name: Smoke test image
        run: |
          docker run -d --rm --name eph -p 8080:8080 ephemeris-service:ci
          for i in $(seq 1 20); do
            curl -fs localhost:8080/healthz && ok=1 && break || sleep 0.5
          done
          test "$ok" = "1" || { docker logs eph; exit 1; }
          # A real chart request through an HTTP worker thread: catches
          # thread-local state regressions that the startup probe cannot.
          body='{"datetime_utc":"1990-05-17T21:15:00Z","lat":59.9386,"lon":30.3141}'
          resp=$(curl -fs -X POST -d "$body" localhost:8080/v1/chart) || { docker logs eph; exit 1; }
          echo "$resp" | grep -q '"ephemeris":"swiss"' || { echo "not swiss: $resp"; exit 1; }
          echo "$resp" | grep -q '"chiron"' || { echo "chiron missing: $resp"; exit 1; }
          docker stop eph
