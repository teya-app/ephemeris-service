version: "2"

linters:
  # standard set: errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - copyloopvar
    - gocritic
    - gosec
    - misspell
    - nolintlint
    - revive
    - unconvert
    - unparam
    - whitespace
  exclusions:
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      # Tests legitimately use weak randomness, fixed seeds and long funcs.
      - path: _test\.go
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/teya-app
